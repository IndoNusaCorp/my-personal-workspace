<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yizhreel | Personal Workspace</title>

    <!-- Favicon -->
    <link rel="icon" href="Assets/favicon.png" type="image/png">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Background Website -->
    <div class="background-website"></div>

    <!-- navbar -->
    <div class="navigation-container">
        <nav class="brand-name">Welcome Bos🫡 | Yizhreel</nav>
    </div>

    <!-- Content -->
    <div class="content-container">
        <div class="text-content">Ayo mulai hari mu dengan semangat!</div>
        <div class="rectangle-content">Bos, ini ada list aplikasi yang sering kamu pakai, boleh silahkan bos🫡</div>
        <div class="icon-discord">
        <!-- Link ke Discord menggunakan URL scheme -->
        <a href="discord://discord.com" target="_blank" rel="noopener noreferrer">
            <img class="discord-icon" src="/Assets/discord-icon.jpeg" alt="discord-icon">
        </a>
    </div>

    <div class="icon-whatsapp">
        <!-- Link ke Whatsapp menggunakan URL scheme -->
        <a href="whatsapp://web.whatsapp.com" target="_blank" rel="noopener noreferrer">
            <img class="whatsapp-icon" src="/Assets/whatsapp-icon.png" alt="whatsapp-icon">
    </a>

    <div class="icon-roblox">
            <!-- Link ke Roblox menggunakan URL scheme -->
            <a href="roblox://roblox.com" target="_blank" rel="noopener noreferrer">
                <img class="roblox-icon" src="/Assets/roblox-icon.jpeg" alt="roblox-icon">
            </a>
        </div>
    </div>

    <div class="icon-google">
        <!-- Link ke Google menggunakan URL scheme -->
        <a href="https://google.com" target="_blank" rel="noopener noreferrer">
            <img class="google-icon" src="/Assets/google-icon.png" alt="google-icon">
        </a>
    </div>

    <div class="icon-chat-gpt">
        <!-- Link ke ChatGPT menggunakan URL scheme -->
        <a href="https://chat.openai.com/" target="_blank" rel="noopener noreferrer">
            <img class="icon-chat-gpt" src="/Assets/chatgpt-icon.png" alt="icon-chat-gpt">
        </a>
    </div>

    <div class="icon-qwen-ai">
        <!-- Link ke qwen menggunakan URL scheme -->
        <a href="https://chat.qwenlm.ai/" target="_blank" rel="noopener noreferrer">
            <img class="icon-qwen-ai" src="/Assets/qwen-icon.jpeg" alt="icon-qwen-ai">
        </a>
    </div>

    <div class="icon-binusmaya">
        <!-- Link ke Binus menggunakan URL scheme -->
        <a href="https://lms.binus.ac.id/" target="_blank" rel="noopener noreferrer">
            <img class="icon-binusmaya" src="/Assets/binusmaya-icon.jpeg" alt="icon-binusmaya">
        </a>
    </div>

    <div class="icon-linkedin">
        <!-- Link ke Binus menggunakan URL scheme -->
        <a href="https://linkedin.com/" target="_blank" rel="noopener noreferrer">
            <img class="icon-linkedin" src="/Assets/linkedin-icon.png" alt="icon-linkedin">
        </a>
    </div>


</div>

    <!-- script section -->
    <script src="Scripts/inspect-element.js"></script>
