    <div class="battery-percentage-container">
        <div class="battery-percentage">Baterai kamu: <span class="batteryLevel">Checking...</span></div>
        <div class="battery-low-message" id="batteryLowMessage"></div>
    </div>

    <script>
        // Fungsi untuk menampilkan persentase baterai dan memeriksa status baterai rendah
        function displayBatteryPercentage() {
            const batteryLevelElement = document.querySelector('.batteryLevel');
            const batteryLowMessageElement = document.getElementById('batteryLowMessage');

            if ('getBattery' in navigator) {
                navigator.getBattery().then(function(battery) {
                    const batteryLevel = Math.round(battery.level * 100); // Menghitung persentase baterai
                    batteryLevelElement.textContent = `${batteryLevel}%`;

                    // Periksa apakah baterai rendah (kurang dari atau sama dengan 20%) 
                    // (angka 20 adalah jika baterai laptop sudah di 20% akan mengeluarkan sebuah pesan untuk mengecas device, bisa di custom angka 20 nya)
                    if (batteryLevel <= 20) {
                        batteryLowMessageElement.textContent = "Bos, baterai laptop low, segera charge untuk pengisian baterai device mu";
                        batteryLowMessageElement.style.color = "red";

                        // Tampilkan notifikasi browser jika baterai rendah
                        if (!("Notification" in window)) {
                            console.log("Browser ini tidak mendukung notifikasi.");
                        } else if (Notification.permission === "granted") {
                            new Notification("Battery Low", {
                                body: "Bos, baterai laptop low, segera charge untuk pengisian baterai device mu",
                                icon: "https://img.icons8.com/color/48/battery--v1.png"
                            });
                        } else if (Notification.permission !== "denied") {
                            Notification.requestPermission().then(function(permission) {
                                if (permission === "granted") {
                                    new Notification("Battery Low", {
                                        body: "Bos, baterai laptop low, segera charge untuk pengisian baterai device mu",
                                        icon: "https://img.icons8.com/color/48/battery--v1.png"
                                    });
                                }
                            });
                        }
                    } else {
                        batteryLowMessageElement.textContent = ""; // Kosongkan pesan jika baterai normal
                    }

                    // Listener untuk perubahan level baterai secara real-time
                    battery.addEventListener('levelchange', function() {
                        const updatedBatteryLevel = Math.round(battery.level * 100);
                        batteryLevelElement.textContent = `${updatedBatteryLevel}%`;

                        if (updatedBatteryLevel <= 20) {
                            batteryLowMessageElement.textContent = "Bos, baterai laptop low, segera charge untuk pengisian baterai device mu";
                            batteryLowMessageElement.style.color = "red";

                            // Tampilkan notifikasi jika baterai rendah
                            if (Notification.permission === "granted") {
                                new Notification("Battery Low", {
                                    body: "Bos, baterai laptop low, segera charge untuk pengisian baterai device mu",
                                    icon: "https://img.icons8.com/color/48/battery--v1.png"
                                });
                            }
                        } else {
                            batteryLowMessageElement.textContent = "";
                        }
                    });
                });
            } else {
                batteryLevelElement.textContent = "API tidak didukung";
            }
        }

        // Panggil fungsi untuk menampilkan persentase baterai
        displayBatteryPercentage();
    </script>

    <script>
        // Tambahkan event listener setelah halaman dimuat
        document.addEventListener('DOMContentLoaded', function() {
            // Temukan elemen dengan ID 'button-logout'
            const logoutButton = document.getElementById('button-logout');
    
            // Tambahkan event listener untuk mengarahkan ke halaman login
            logoutButton.addEventListener('click', function() {
                // Tampilkan pop-up konfirmasi
                const isConfirmed = confirm('Apakah kamu yakin mau keluar?');
    
                // Jika pengguna memilih "OK", redirect ke halaman login
                if (isConfirmed) {
                    window.location.href = 'index.html'; // Ganti dengan URL halaman login Anda
                }
                // Jika pengguna memilih "Cancel", tidak ada tindakan
            });
        });
    </script>
